name: Build and Deploy (Hostinger FTP)

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - name: Disable local CMS file API for static export
        run: rm -rf app/api

      - name: Build static export
        run: npm run build
        env:
          NEXT_STATIC_EXPORT: "true"

      - name: Deploy via FTP (sync only)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21

          # Next export output
          local-dir: ./out/

          # ✅ SOLO el subdominio (ajusta a tu nombre real)
          server-dir: ./domains/aionsite.com.mx/public_html/

          # ✅ NO limpiar todo
          dangerous-clean-slate: false

          # (Opcional) si quieres que borre archivos que ya no existen en out/
          # (solo dentro del server-dir)
          # dangerous-clean-slate: false ya es “no wipe”
          # pero el action igual puede eliminar "stale" según config interna;
          # si NO quieres borrar nada nunca, lo dejamos así y listo.

          exclude: |
            **/.git*
            **/.github/**
            **/node_modules/**
