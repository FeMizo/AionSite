name: Build and Deploy (Hostinger FTP)

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Disable local CMS file API for static export
        run: rm -rf app/api

      - name: Build static export
        run: npm run build
        env:
          NEXT_STATIC_EXPORT: "true"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
          set cmd:fail-exit yes
          set ftp:ssl-allow false
          set ssl:verify-certificate no
          set xfer:clobber on
          set xfer:use-temp-file yes
          set net:max-retries 5
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 30
          set net:timeout 30
          set mirror:parallel-directories false
          mirror --reverse --verbose --continue --only-newer --parallel=1 ./out/ ./domains/aionsite.com.mx/public_html/
          bye
          EOF
