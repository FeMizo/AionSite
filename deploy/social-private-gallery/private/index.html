<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>AionSite Social Assets</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #071226;
        --panel: #0d1a33;
        --line: #1f3b64;
        --text: #f8fafc;
        --muted: #9fb4d4;
        --blue: #3f8cff;
        --green: #22c55e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(63, 140, 255, 0.18), transparent 34rem),
          linear-gradient(135deg, #030712, var(--bg));
        color: var(--text);
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 28px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 20px;
      }

      h1 {
        margin: 0;
        font-size: clamp(32px, 5vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 16px;
      }

      .badge {
        border: 1px solid rgba(34, 197, 94, 0.65);
        color: #bbf7d0;
        padding: 8px 12px;
        border-radius: 8px;
        white-space: nowrap;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 18px;
      }

      .asset {
        background: rgba(13, 26, 51, 0.82);
        border: 1px solid rgba(63, 140, 255, 0.28);
        border-radius: 8px;
        overflow: hidden;
      }

      .asset a {
        color: inherit;
        text-decoration: none;
      }

      .asset img {
        display: block;
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        background: #020617;
      }

      .asset figcaption {
        padding: 12px;
        color: var(--muted);
        font-size: 13px;
        overflow-wrap: anywhere;
      }

      .note {
        margin-top: 28px;
        padding: 14px 16px;
        border: 1px solid rgba(63, 140, 255, 0.25);
        border-radius: 8px;
        background: rgba(13, 26, 51, 0.72);
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AionSite Social Assets</h1>
          <p>Galeria privada para revisar piezas usadas en Instagram y Facebook.</p>
        </div>
        <div class="badge">Privado</div>
      </header>

      <section class="grid" aria-label="Assets sociales">
        <figure class="asset">
          <a href="../public/convierte-visitas-en-clientes.png" target="_blank" rel="noopener">
            <img src="../public/convierte-visitas-en-clientes.png" alt="Convierte visitas en clientes" />
            <figcaption>convierte-visitas-en-clientes.png</figcaption>
          </a>
        </figure>
      </section>

      <p class="note">
        Para agregar nuevas imagenes, subelas a <strong>/social/public/</strong> y duplica una tarjeta
        en este archivo apuntando a <strong>../public/nombre-del-archivo.png</strong>.
      </p>
    </main>
  </body>
</html>
